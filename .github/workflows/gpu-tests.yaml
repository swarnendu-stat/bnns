name: GPU / OpenCL Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  gpu-test:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # This triggers the skip_if_not logic in your test-gpu.R
      BNNS_TEST_GPU: "true" 

    steps:
      - uses: actions/checkout@v3

      - name: Install OpenCL (POCL) and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pocl-opencl-icd ocl-icd-opencl-dev clinfo
          # Run clinfo to verify POCL is recognized as an OpenCL platform
          clinfo

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::devtools
          needs: check

      - name: Install CmdStan
        run: |
          cmdstanr::install_cmdstan(cores = 2)
        shell: Rscript {0}

      - name: Run Package Tests
        run: |
          devtools::test()
        shell: Rscript {0}
